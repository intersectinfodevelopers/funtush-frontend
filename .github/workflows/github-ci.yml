name: CI-CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    name: Build Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # - name: Remove Windows-only optional deps from lockfile
      #   run: npm pkg delete optionalDependencies.@next/swc-win32-x64-msvc || true

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/

  test:
    name: Test Stage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test -- --passWithNoTests

  docker:
    name: Docker Build Stage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push, no save)
        run: |
          docker build \
            --tag funtush-frontend:${{ github.sha }} \
            --tag funtush-frontend:latest \
            .

      - name: List Docker images
        run: docker images 

  approval:
    name: Manual Approval Stage
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/dev'

    environment:
      name: staging

    steps:
      - name: Approval Message
        run: echo "Build ready for deployment (no actual deploy configured)"
