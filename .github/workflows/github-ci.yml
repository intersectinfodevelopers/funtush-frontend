name: CI-CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm lint

      - name: Build Project
        run: pnpm build

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            -t funtush-frontend:${{ github.sha }} \
            -t funtush-frontend:latest \
            .

      - name: List Docker images
        run: docker images

  approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/dev' || github.event_name == 'workflow_dispatch'

    environment:
      name: staging

    steps:
      - name: Awaiting Approval
        run: echo "Approved for staging"