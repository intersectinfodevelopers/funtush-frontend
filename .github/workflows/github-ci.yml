name: CI-CD Pipeline
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
jobs:
  build:
    name: Build Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install pnpm
        run: |
          npm install -g pnpm@latest
          npm exec pnpm -- --version
      - name: Install dependencies
        run: npm exec pnpm -- install --frozen-lockfile
      - name: Build project
        run: npm exec pnpm -- build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
  test:
    name: Test Stage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install pnpm
        run: |
          npm install -g pnpm@latest
          npm exec pnpm -- --version
      - name: Install dependencies
        run: npm exec pnpm -- install --frozen-lockfile
      - name: Run Lint
        run: npm exec pnpm -- lint
      - name: Run Tests
        run: npm exec pnpm -- test -- --passWithNoTests
  docker:
    name: Docker Build Stage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image (no push, no save)
        run: |
          docker build \
            --tag funtush-frontend:${{ github.sha }} \
            --tag funtush-frontend:latest \
            .
      - name: List Docker images
        run: docker images
  approval:
    name: Manual Approval Stage
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/dev' || github.event_name == 'workflow_dispatch'
    environment:
      name: staging
    steps:
      - name: Awaiting Approval
        run: echo "Approved for staging"
